name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Dummy values just so pydantic-settings can build Settings() during import.
    # Tests themselves run against an in-memory SQLite DB (see conftest.py) and
    # never touch a real Postgres instance - these values are never used for
    # an actual connection.
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ci_test_db
      DB_USER: ci_test_user
      DB_PASSWORD: ci_test_password
      JWT_SECRET_KEY: ci-only-secret-key-not-used-in-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -v